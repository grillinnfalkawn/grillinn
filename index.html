// Build flat item lookup
const ALL_ITEMS = {};
Object.values(MENU).flat().forEach(i => ALL_ITEMS[i.id] = i);

function isVegItem(item) {
  const d = item.description.toLowerCase();
  const t = item.title.toLowerCase();
  return !d.includes('chicken') && !t.includes('chicken') && d !== 'fried chicken' && d !== 'grilled chicken';
}

function isVegCat(cat) {
  return cat.startsWith('Veg ') || (!cat.startsWith('Chicken ') && !['Fried Chicken','Grilled Chicken'].includes(cat));
}

// ── OPENING HOURS ──
function getStatus() {
  const now = new Date();
  const day = now.getDay();
  const hour = now.getHours() + now.getMinutes() / 60;
  const open = HOURS.open[day];
  const close = HOURS.close[day];
  if (open === null) return { open: false, msg: '🔴 Closed today (Saturday). We reopen Sunday at 11:00 AM.' };
  if (hour < open) return { open: false, msg: `🔴 We open at 11:00 AM today. Orders can be placed during opening hours.` };
  if (hour >= close) {
    const msgs = { 4: 'We reopen Sunday at 11:00 AM.', 5: 'We reopen Sunday at 11:00 AM.' };
    return { open: false, msg: `🔴 We're closed for today. ${msgs[day] || 'We open at 11:00 AM tomorrow.'}` };
  }
  const closeStr = close === 21.5 ? '9:30 PM' : '4:00 PM';
  return { open: true, msg: `🟢 Open now! Closing at ${closeStr} today.` };
}

// ── CART ──
let cart = {};
let orderType = null;
let orderCounter = parseInt(localStorage.getItem('gi_counter') || '0');

function addToCart(id) {
  if (cart[id]) cart[id].qty++;
  else cart[id] = { ...ALL_ITEMS[id], qty: 1, note: '' };
  refreshCard(id);
  updateCartUI();
}

function updateQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  refreshCard(id);
  updateCartUI();
}

function setNote(id, val) {
  if (cart[id]) cart[id].note = val;
}

function refreshCard(id) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  const item = ALL_ITEMS[id];
  const footer = card.querySelector('.item-footer');
  if (cart[id]) {
    footer.innerHTML = `
      <div class="item-price">₹${item.price}</div>
      <div class="qty-ctrl">
        <button onclick="updateQty('${id}',-1)">−</button>
        <span class="qty-num">${cart[id].qty}</span>
        <button onclick="updateQty('${id}',1)">+</button>
      </div>`;
    // Show note input
    let noteWrap = card.querySelector('.note-wrap');
    if (!noteWrap) {
      noteWrap = document.createElement('div');
      noteWrap.className = 'note-wrap';
      noteWrap.innerHTML = `<textarea class="note-input" rows="1" placeholder="Special instructions..." onchange="setNote('${id}',this.value)">${cart[id].note||''}</textarea>`;
      card.querySelector('.item-body').appendChild(noteWrap);
    }
  } else {
    footer.innerHTML = `
      <div class="item-price">₹${item.price}</div>
      <button class="add-btn" onclick="addToCart('${id}')">+</button>`;
    const noteWrap = card.querySelector('.note-wrap');
    if (noteWrap) noteWrap.remove();
  }
}

function calcTotals() {
  const items = Object.values(cart);
  const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
  const hasRegularPizza = items.some(i => REGULAR_PIZZA_IDS.has(i.id));
  const packingCharge = hasRegularPizza ? PACKING_CHARGE : 0;
  const count = items.reduce((s, i) => s + i.qty, 0);
  return { subtotal, packingCharge, count };
}

function updateCartUI() {
  const { subtotal, packingCharge, count } = calcTotals();
  const total = subtotal + packingCharge;
  document.getElementById('cartCount').textContent = count;
  const bar = document.getElementById('cartBar');
  if (count > 0) {
    bar.classList.add('visible');
    document.getElementById('cartBarLeft').textContent = count + ' item' + (count > 1 ? 's' : '');
    document.getElementById('cartBarRight').textContent = '₹' + total + ' — View Cart →';
  } else {
    bar.classList.remove('visible');
  }
}

function openCart() { document.getElementById('overlay').classList.add('open'); document.getElementById('drawer').classList.add('open'); renderDrawer(); }
function closeCart() { document.getElementById('overlay').classList.remove('open'); document.getElementById('drawer').classList.remove('open'); }

function renderDrawer() {
  const items = Object.entries(cart);
  const { subtotal, packingCharge, count } = calcTotals();
  const total = subtotal + packingCharge;
  const content = document.getElementById('cartContent');
  const status = getStatus();

  if (items.length === 0) {
    content.innerHTML = `<div class="empty-cart"><div class="empty-cart-icon">🛒</div><div>Your cart is empty</div><div style="font-size:0.75rem;margin-top:0.3rem;color:var(--muted)">Browse the menu and add items!</div></div>`;
    return;
  }

  let html = '';
  items.forEach(([id, item]) => {
    const dot = isVegItem(item) ? '🟢' : '🔴';
    html += `<div class="cart-item">
      <div style="flex:1">
        <div class="cart-item-name">${dot} ${item.title}</div>
        ${item.note ? `<div class="cart-item-note">📝 ${item.note}</div>` : ''}
      </div>
      <div class="qty-ctrl" style="margin:0 0.5rem;">
        <button onclick="updateQty('${id}',-1);renderDrawer()">−</button>
        <span class="qty-num">${item.qty}</span>
        <button onclick="updateQty('${id}',1);renderDrawer()">+</button>
      </div>
      <div class="cart-item-price">₹${item.price * item.qty}</div>
    </div>`;
  });

  html += `<div class="cart-summary">
    <div class="summary-row"><span>Sub Total</span><span>₹${subtotal}</span></div>
    ${packingCharge > 0 ? `<div class="summary-row"><span>Packing Charges (Regular Pizza)</span><span>₹${packingCharge}</span></div>` : ''}
    <div class="summary-row total"><span>Total</span><span>₹${total}</span></div>
  </div>`;

  html += `<div class="checkout-section">
    <div class="checkout-title">How would you like your order?</div>
    <div class="order-type-btns">
      <button class="otype-btn ${orderType==='Delivery'?'selected':''}" onclick="selectType('Delivery')"><span class="otype-icon">🚚</span>Delivery</button>
      <button class="otype-btn ${orderType==='Takeaway'?'selected':''}" onclick="selectType('Takeaway')"><span class="otype-icon">🥡</span>Takeaway</button>
      <button class="otype-btn ${orderType==='Dine In'?'selected':''}" onclick="selectType('Dine In')"><span class="otype-icon">🍽️</span>Dine In</button>
    </div>
    <div id="checkoutForm"></div>
  </div>`;

  content.innerHTML = html;
  if (orderType) renderCheckoutForm(total, status);
}

function selectType(type) { orderType = type; renderDrawer(); }

function renderCheckoutForm(total, status) {
  const form = document.getElementById('checkoutForm');
  const status2 = status || getStatus();

  let zoneOptions = DELIVERY_ZONES.map(z =>
    `<option value="${z.charge}">${z.name}${z.charge === 0 ? ' — Free' : ` — ₹${z.charge}`}</option>`
  ).join('');

  const deliveryFields = orderType === 'Delivery' ? `
    <div class="form-group">
      <label>Delivery Zone *</label>
      <select id="fZone" onchange="updateDeliveryTotal()">
        <option value="">— Select your area —</option>
        ${zoneOptions}
      </select>
    </div>
    <div class="form-group">
      <label>Full Address *</label>
      <textarea id="fAddress" rows="2" placeholder="House no., landmark..."></textarea>
    </div>
    <div id="deliveryTotalRow" style="display:none" class="note-box"></div>` : '';

  form.innerHTML = `
    ${!status2.open ? `<div class="closed-box">⚠️ ${status2.msg}<br>You can still browse, but orders are only accepted during opening hours.</div>` : ''}
    <div class="form-group"><label>Your Name *</label><input type="text" id="fName" placeholder="e.g. Lalremruata"></div>
    <div class="form-group"><label>Phone Number *</label><input type="tel" id="fPhone" placeholder="e.g. 9876543210"></div>
    ${deliveryFields}
    <div class="form-group"><label>Special Instructions (optional)</label><textarea id="fNotes" rows="2" placeholder="Any special requests for the whole order..."></textarea></div>
    <div class="note-box">💵 Payment: <strong>Cash on Delivery</strong></div>
    <button class="place-btn" id="placeBtn" onclick="placeOrder()" ${!status2.open ? 'disabled' : ''}>
      ${!status2.open ? 'Shop Closed' : 'Place Order'}
    </button>`;
}

function updateDeliveryTotal() {
  const zone = document.getElementById('fZone');
  const row = document.getElementById('deliveryTotalRow');
  if (!zone || !row) return;
  const deliveryCharge = parseInt(zone.value) || 0;
  const { subtotal, packingCharge } = calcTotals();
  const grandTotal = subtotal + packingCharge + deliveryCharge;
  if (zone.value !== '') {
    row.style.display = 'block';
    row.innerHTML = `🛵 Delivery: ₹${deliveryCharge} &nbsp;|&nbsp; <strong>Grand Total: ₹${grandTotal}</strong>`;
  } else {
    row.style.display = 'none';
  }
}

async function placeOrder() {
  const name = document.getElementById('fName')?.value.trim();
  const phone = document.getElementById('fPhone')?.value.trim();
  const notes = document.getElementById('fNotes')?.value.trim() || '';
  let address = '';
  let deliveryCharge = 0;
  let zoneName = '';

  if (!name) { alert('Please enter your name.'); return; }
  if (!phone || phone.length < 10) { alert('Please enter a valid phone number.'); return; }

  if (orderType === 'Delivery') {
    const zoneEl = document.getElementById('fZone');
    const addrEl = document.getElementById('fAddress');
    if (!zoneEl?.value) { alert('Please select your delivery zone.'); return; }
    if (!addrEl?.value.trim()) { alert('Please enter your delivery address.'); return; }
    deliveryCharge = parseInt(zoneEl.value);
    zoneName = zoneEl.options[zoneEl.selectedIndex].text;
    address = addrEl.value.trim();
  }

  const btn = document.getElementById('placeBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Placing order...';

  orderCounter++;
  localStorage.setItem('gi_counter', orderCounter);
  const orderNumber = String(orderCounter).padStart(3, '0');

  const { subtotal, packingCharge } = calcTotals();
  const grandTotal = subtotal + packingCharge + deliveryCharge;

  const items = Object.entries(cart).map(([id, item]) => ({
    product_retailer_id: item.title + (item.note ? ` [${item.note}]` : ''),
    quantity: item.qty,
    item_price: item.price
  }));

  const payload = {
    source: 'website',
    order_number: orderNumber,
    customer_name: name,
    customer_phone: phone,
    order_type: orderType,
    address: orderType === 'Delivery' ? `${zoneName} — ${address}` : '',
    delivery_charge: deliveryCharge,
    packing_charge: packingCharge,
    subtotal: subtotal,
    grand_total: grandTotal,
    notes: notes,
    items: items,
    order_time: new Date().toLocaleString('en-IN', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:false})
  };

  try {
    const res = await fetch(SERVER_URL + '/web-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (res.ok) {
      closeCart();
      document.getElementById('successOrder').textContent = `Order #${orderNumber} — ₹${grandTotal}`;
      document.getElementById('successScreen').classList.add('show');
      cart = {};
      orderType = null;
      updateCartUI();
      document.querySelectorAll('.item-card').forEach(card => {
        const id = card.id.replace('card-', '');
        const item = ALL_ITEMS[id];
        if (item) {
          const footer = card.querySelector('.item-footer');
          if (footer) footer.innerHTML = `<div class="item-price">₹${item.price}</div><button class="add-btn" onclick="addToCart('${id}')">+</button>`;
          const noteWrap = card.querySelector('.note-wrap');
          if (noteWrap) noteWrap.remove();
        }
      });
    } else throw new Error('error');
  } catch(e) {
    alert('Could not place order. Please call us at 9612992023.');
    btn.disabled = false;
    btn.textContent = 'Place Order';
  }
}

function resetOrder() { document.getElementById('successScreen').classList.remove('show'); }

// ── SEARCH ──
function handleSearch(query) {
  const q = query.toLowerCase().trim();
  const main = document.getElementById('menuMain');
  if (!q) { buildMenu(); return; }

  const results = Object.values(MENU).flat().filter(i =>
    i.title.toLowerCase().includes(q) || i.description.toLowerCase().includes(q)
  );

  main.innerHTML = '';
  if (results.length === 0) {
    main.innerHTML = `<div class="no-results"><div class="no-results-icon">🔍</div><div>No items found for "${query}"</div></div>`;
    return;
  }

  const sec = document.createElement('div');
  sec.className = 'cat-section';
  sec.innerHTML = `<div class="cat-title">🔍 Search Results (${results.length})</div>`;
  const grid = document.createElement('div');
  grid.className = 'items-grid';
  results.forEach(item => grid.appendChild(makeCard(item)));
  sec.appendChild(grid);
  main.appendChild(sec);
}

// ── BUILD MENU ──
function makeCard(item) {
  const veg = isVegItem(item);
  const card = document.createElement('div');
  card.className = 'item-card';
  card.id = 'card-' + item.id;
  const inCart = cart[item.id];
  const footerHTML = inCart
    ? `<div class="item-price">₹${item.price}</div><div class="qty-ctrl"><button onclick="updateQty('${item.id}',-1)">−</button><span class="qty-num">${inCart.qty}</span><button onclick="updateQty('${item.id}',1)">+</button></div>`
    : `<div class="item-price">₹${item.price}</div><button class="add-btn" onclick="addToCart('${item.id}')">+</button>`;
  card.innerHTML = `
    <div class="item-img">${CAT_ICONS[Object.keys(MENU).find(k => MENU[k].some(i => i.id === item.id))] || '🍽️'}</div>
    <div class="item-body">
      <div class="item-name-row">
        <div class="veg-dot ${veg ? 'veg' : 'nonveg'}"></div>
        <div class="item-name">${item.title}</div>
      </div>
      <div class="item-desc">${item.description}</div>
      <div class="item-footer">${footerHTML}</div>
      ${inCart && inCart.note ? `<div class="note-wrap"><textarea class="note-input" rows="1" placeholder="Special instructions..." onchange="setNote('${item.id}',this.value)">${inCart.note}</textarea></div>` : ''}
    </div>`;
  return card;
}

function buildMenu() {
  const nav = document.getElementById('catNav');
  const main = document.getElementById('menuMain');
  nav.innerHTML = '';
  main.innerHTML = '';

  // Popular section
  const popularItems = POPULAR_IDS.map(id => ALL_ITEMS[id]).filter(Boolean);
  if (popularItems.length) {
    const pill = document.createElement('button');
    pill.className = 'cat-pill active';
    pill.textContent = '⭐ Most Popular';
    pill.onclick = () => { document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active')); pill.classList.add('active'); document.getElementById('sec-popular').scrollIntoView({behavior:'smooth',block:'start'}); };
    nav.appendChild(pill);

    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.id = 'sec-popular';
    sec.innerHTML = `<div class="cat-title">⭐ Most Popular</div>`;
    const grid = document.createElement('div');
    grid.className = 'items-grid';
    popularItems.forEach(item => grid.appendChild(makeCard(item)));
    sec.appendChild(grid);
    main.appendChild(sec);
  }

  // Category sections
  Object.entries(MENU).forEach(([ cat, items ], i) => {
    const pill = document.createElement('button');
    pill.className = 'cat-pill';
    const vegBadge = cat.startsWith('Veg ') ? ' 🟢' : cat.startsWith('Chicken ') ? ' 🔴' : '';
    pill.textContent = (CAT_ICONS[cat] || '🍽️') + ' ' + cat + vegBadge;
    pill.onclick = () => { document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active')); pill.classList.add('active'); document.getElementById('sec-' + i).scrollIntoView({behavior:'smooth',block:'start'}); };
    nav.appendChild(pill);

    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.id = 'sec-' + i;

    const isVeg = cat.startsWith('Veg ');
    const isNonVeg = cat.startsWith('Chicken ') || ['Fried Chicken','Grilled Chicken'].includes(cat);
    const badge = isVeg ? '<span class="veg-badge">🟢 VEG</span>' : isNonVeg ? '<span class="nonveg-badge">🔴 NON-VEG</span>' : '';
    sec.innerHTML = `<div class="cat-title">${CAT_ICONS[cat] || '🍽️'} ${cat} ${badge}</div>`;

    const grid = document.createElement('div');
    grid.className = 'items-grid';
    items.forEach(item => grid.appendChild(makeCard(item)));
    sec.appendChild(grid);
    main.appendChild(sec);
  });
}

// ── INIT ──
function init() {
  const status = getStatus();
  const banner = document.getElementById('statusBanner');
  banner.className = 'status-banner ' + (status.open ? 'status-open' : 'status-closed');
  banner.textContent = status.msg;
  buildMenu();
}

init();
</script>
</body>
</html>
