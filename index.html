<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grill Inn — Order Online</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --black:   #0f0f0f;
    --charcoal:#1a1a1a;
    --panel:   #222222;
    --border:  #2e2e2e;
    --orange:  #f97316;
    --red:     #dc2626;
    --flame:   #ea580c;
    --white:   #f5f5f5;
    --muted:   #888;
    --card-bg: #1e1e1e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--charcoal);
    border-bottom: 2px solid var(--flame);
    padding: 0 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--orange), var(--red));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .cart-btn {
    background: linear-gradient(135deg, var(--orange), var(--red));
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    padding: 0.5rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    transition: opacity 0.2s;
  }
  .cart-btn:hover { opacity: 0.85; }
  .cart-count {
    background: white;
    color: var(--red);
    border-radius: 50%;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 800;
  }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(135deg, #1a0a00 0%, #2d0f00 50%, #1a0000 100%);
    padding: 2.5rem 1rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--orange), var(--red));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .hero p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 0.5rem;
  }
  .hero p span {
    color: var(--orange);
    font-weight: 600;
  }

  /* ── CATEGORY NAV ── */
  .cat-nav {
    overflow-x: auto;
    background: var(--charcoal);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 1rem;
    display: flex;
    gap: 0.5rem;
    scrollbar-width: none;
    position: sticky;
    top: 60px;
    z-index: 90;
  }
  .cat-nav::-webkit-scrollbar { display: none; }
  .cat-pill {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 0.35rem 0.9rem;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .cat-pill:hover, .cat-pill.active {
    background: var(--flame);
    border-color: var(--flame);
    color: white;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.5rem 1rem 6rem;
  }

  /* ── CATEGORY SECTION ── */
  .cat-section { margin-bottom: 2.5rem; }
  .cat-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    color: var(--orange);
    border-left: 4px solid var(--red);
    padding-left: 0.75rem;
    margin-bottom: 1rem;
  }

  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.75rem;
  }

  /* ── ITEM CARD ── */
  .item-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    display: flex;
    flex-direction: column;
  }
  .item-card:hover {
    border-color: var(--flame);
    transform: translateY(-2px);
  }

  .item-img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    background: linear-gradient(135deg, #2a1500, #1a0a0a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
  }

  .item-body {
    padding: 0.6rem 0.7rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .item-name {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--white);
    line-height: 1.3;
  }

  .item-desc {
    font-size: 0.7rem;
    color: var(--muted);
  }

  .item-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    padding-top: 0.4rem;
  }

  .item-price {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--orange);
  }

  .add-btn {
    background: linear-gradient(135deg, var(--orange), var(--red));
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 700;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }
  .add-btn:hover { opacity: 0.8; }

  .qty-ctrl {
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .qty-ctrl button {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--white);
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 700;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qty-ctrl button:hover { border-color: var(--orange); color: var(--orange); }
  .qty-num {
    font-size: 0.85rem;
    font-weight: 700;
    min-width: 16px;
    text-align: center;
    color: var(--orange);
  }

  /* ── FLOATING CART ── */
  .cart-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(135deg, var(--orange), var(--red));
    padding: 0.9rem 1.5rem;
    display: none;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    z-index: 200;
    box-shadow: 0 -4px 20px rgba(249,115,22,0.3);
  }
  .cart-bar.visible { display: flex; }
  .cart-bar-left { font-size: 0.85rem; font-weight: 600; }
  .cart-bar-right { font-size: 0.9rem; font-weight: 700; }

  /* ── CART DRAWER ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
  }
  .overlay.open { display: block; }

  .drawer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--charcoal);
    border-top: 2px solid var(--flame);
    border-radius: 16px 16px 0 0;
    max-height: 90vh;
    overflow-y: auto;
    z-index: 400;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    padding: 1.5rem 1rem 2rem;
  }
  .drawer.open { transform: translateY(0); }

  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.2rem;
  }
  .drawer-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 1px;
    color: var(--orange);
  }
  .close-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--white);
    cursor: pointer;
    font-size: 1.2rem;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cart-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.7rem 0;
    border-bottom: 1px solid var(--border);
    gap: 0.5rem;
  }
  .cart-item-name { font-size: 0.85rem; font-weight: 600; flex: 1; }
  .cart-item-price { font-size: 0.85rem; color: var(--orange); font-weight: 700; min-width: 60px; text-align: right; }

  .cart-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 0 0.5rem;
    font-weight: 700;
    font-size: 1rem;
  }
  .cart-total span:last-child { color: var(--orange); font-size: 1.1rem; }

  /* ── CHECKOUT FORM ── */
  .checkout-section { margin-top: 1rem; }
  .checkout-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 1px;
    color: var(--orange);
    margin-bottom: 0.8rem;
  }

  .order-type-btns {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .otype-btn {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.78rem;
    font-weight: 700;
    padding: 0.6rem 0.3rem;
    text-align: center;
    transition: all 0.2s;
  }
  .otype-btn:hover { border-color: var(--flame); color: var(--white); }
  .otype-btn.selected { background: var(--flame); border-color: var(--flame); color: white; }
  .otype-icon { font-size: 1.2rem; display: block; margin-bottom: 0.2rem; }

  .form-group { margin-bottom: 0.8rem; }
  .form-group label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 0.3rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group input, .form-group textarea {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    padding: 0.65rem 0.8rem;
    width: 100%;
    transition: border-color 0.2s;
    outline: none;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--orange); }
  .form-group textarea { resize: none; rows: 2; }

  .place-btn {
    background: linear-gradient(135deg, var(--orange), var(--red));
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 0.9rem;
    width: 100%;
    margin-top: 0.5rem;
    transition: opacity 0.2s;
    letter-spacing: 0.5px;
  }
  .place-btn:hover { opacity: 0.85; }
  .place-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── SUCCESS SCREEN ── */
  .success-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--black);
    z-index: 999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .success-screen.show { display: flex; }
  .success-icon { font-size: 4rem; margin-bottom: 1rem; }
  .success-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--orange), var(--red));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }
  .success-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 0.3rem; }
  .success-order { color: var(--orange); font-weight: 700; font-size: 1.1rem; margin-bottom: 2rem; }
  .new-order-btn {
    background: linear-gradient(135deg, var(--orange), var(--red));
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    padding: 0.8rem 2rem;
  }

  /* ── EMPTY CART ── */
  .empty-cart {
    text-align: center;
    padding: 2rem 0;
    color: var(--muted);
  }
  .empty-cart-icon { font-size: 3rem; margin-bottom: 0.5rem; }

  /* ── NOTE BOX ── */
  .note-box {
    background: rgba(249,115,22,0.1);
    border: 1px solid rgba(249,115,22,0.3);
    border-radius: 8px;
    color: var(--orange);
    font-size: 0.78rem;
    padding: 0.6rem 0.8rem;
    margin-bottom: 0.8rem;
  }

  /* ── SPINNER ── */
  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (min-width: 600px) {
    .items-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
    .drawer { max-width: 480px; left: 50%; transform: translateX(-50%) translateY(100%); right: auto; width: 100%; }
    .drawer.open { transform: translateX(-50%) translateY(0); }
    .cart-bar { max-width: 480px; left: 50%; transform: translateX(-50%); right: auto; border-radius: 12px 12px 0 0; }
  }
</style>
</head>

const CAT_ICONS = {
  "Burgers":"🍔","Wraps":"🌯","Fried Chicken":"🍗","Grilled Chicken":"🍖",
  "Footlongs":"🥖","Sandwiches":"🥪","Pizza":"🍕","Pastas":"🍝",
  "Garlic Breads":"🧄","Snacks":"🍟","Fries":"🍟","Beverages":"🥤",
  "Desserts":"🍨","Add Ons":"➕","Combos":"🎁"
};

let cart = {};
let orderType = null;
let orderCounter = parseInt(localStorage.getItem('grillinn_counter') || '0');

// ── BUILD MENU ──
function buildMenu() {
  const nav = document.getElementById('catNav');
  const main = document.getElementById('menuMain');
  const cats = Object.keys(MENU);

  cats.forEach((cat, i) => {
    // Nav pill
    const pill = document.createElement('button');
    pill.className = 'cat-pill' + (i === 0 ? ' active' : '');
    pill.textContent = (CAT_ICONS[cat] || '🍽️') + ' ' + cat;
    pill.onclick = () => {
      document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      document.getElementById('cat-' + i).scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    nav.appendChild(pill);

    // Section
    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.id = 'cat-' + i;
    sec.innerHTML = `<div class="cat-title">${CAT_ICONS[cat] || '🍽️'} ${cat}</div>`;

    const grid = document.createElement('div');
    grid.className = 'items-grid';

    MENU[cat].forEach(item => {
      const card = document.createElement('div');
      card.className = 'item-card';
      card.id = 'card-' + item.id;
      card.innerHTML = `
        <div class="item-img">${CAT_ICONS[cat] || '🍽️'}</div>
        <div class="item-body">
          <div class="item-name">${item.title}</div>
          <div class="item-desc">${item.description}</div>
          <div class="item-footer">
            <div class="item-price">₹${item.price}</div>
            <button class="add-btn" onclick="addToCart('${item.id}', '${item.title.replace(/'/g,"\\'")}', ${item.price})">+</button>
          </div>
        </div>`;
      grid.appendChild(card);
    });

    sec.appendChild(grid);
    main.appendChild(sec);
  });
}

// ── CART FUNCTIONS ──
function addToCart(id, title, price) {
  if (cart[id]) {
    cart[id].qty++;
  } else {
    cart[id] = { title, price, qty: 1 };
  }
  updateCardBtn(id);
  updateCartUI();
}

function updateQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  updateCardBtn(id);
  updateCartUI();
}

function updateCardBtn(id) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  const footer = card.querySelector('.item-footer');
  const item = Object.values(MENU).flat().find(i => i.id === id);
  if (cart[id]) {
    footer.innerHTML = `
      <div class="item-price">₹${item.price}</div>
      <div class="qty-ctrl">
        <button onclick="updateQty('${id}', -1)">−</button>
        <span class="qty-num">${cart[id].qty}</span>
        <button onclick="updateQty('${id}', 1)">+</button>
      </div>`;
  } else {
    footer.innerHTML = `
      <div class="item-price">₹${item.price}</div>
      <button class="add-btn" onclick="addToCart('${id}', '${item.title.replace(/'/g,"\\'")}', ${item.price})">+</button>`;
  }
}

function updateCartUI() {
  const items = Object.values(cart);
  const total = items.reduce((s, i) => s + i.price * i.qty, 0);
  const count = items.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cartCount').textContent = count;
  const bar = document.getElementById('cartBar');
  if (count > 0) {
    bar.classList.add('visible');
    document.getElementById('cartBarLeft').textContent = count + ' item' + (count > 1 ? 's' : '');
    document.getElementById('cartBarRight').textContent = '₹' + total + ' — View Cart →';
  } else {
    bar.classList.remove('visible');
  }
}

function openCart() {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  renderDrawer();
}

function closeCart() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function renderDrawer() {
  const items = Object.entries(cart);
  const total = items.reduce((s, [, i]) => s + i.price * i.qty, 0);
  const content = document.getElementById('cartContent');

  if (items.length === 0) {
    content.innerHTML = `
      <div class="empty-cart">
        <div class="empty-cart-icon">🛒</div>
        <div>Your cart is empty</div>
        <div style="font-size:0.8rem;margin-top:0.3rem;color:var(--muted)">Add some items to get started!</div>
      </div>`;
    return;
  }

  let html = '';
  items.forEach(([id, item]) => {
    html += `
      <div class="cart-item">
        <div class="cart-item-name">${item.title}</div>
        <div class="qty-ctrl">
          <button onclick="updateQty('${id}', -1); renderDrawer()">−</button>
          <span class="qty-num">${item.qty}</span>
          <button onclick="updateQty('${id}', 1); renderDrawer()">+</button>
        </div>
        <div class="cart-item-price">₹${item.price * item.qty}</div>
      </div>`;
  });

  html += `
    <div class="cart-total"><span>Total</span><span>₹${total}</span></div>
    <div class="checkout-section">
      <div class="checkout-title">How would you like your order?</div>
      <div class="order-type-btns">
        <button class="otype-btn ${orderType==='Delivery'?'selected':''}" onclick="selectType('Delivery')">
          <span class="otype-icon">🚚</span>Delivery
        </button>
        <button class="otype-btn ${orderType==='Takeaway'?'selected':''}" onclick="selectType('Takeaway')">
          <span class="otype-icon">🥡</span>Takeaway
        </button>
        <button class="otype-btn ${orderType==='Dine In'?'selected':''}" onclick="selectType('Dine In')">
          <span class="otype-icon">🍽️</span>Dine In
        </button>
      </div>
      <div id="checkoutForm"></div>
    </div>`;

  content.innerHTML = html;
  if (orderType) renderCheckoutForm();
}

function selectType(type) {
  orderType = type;
  renderDrawer();
}

function renderCheckoutForm() {
  const form = document.getElementById('checkoutForm');
  const deliveryNote = orderType === 'Delivery'
    ? `<div class="note-box">🛵 Delivery charges applicable. Our team will confirm the amount.</div>` : '';
  const addressField = orderType === 'Delivery'
    ? `<div class="form-group">
        <label>Delivery Address *</label>
        <textarea id="fAddress" rows="2" placeholder="House no., street, landmark..."></textarea>
       </div>` : '';

  form.innerHTML = `
    ${deliveryNote}
    <div class="form-group">
      <label>Your Name *</label>
      <input type="text" id="fName" placeholder="e.g. Lalremruata">
    </div>
    <div class="form-group">
      <label>Phone Number *</label>
      <input type="tel" id="fPhone" placeholder="e.g. 9876543210">
    </div>
    ${addressField}
    <div class="form-group">
      <label>Special Instructions (optional)</label>
      <textarea id="fNotes" rows="2" placeholder="Extra spicy, no onions, etc."></textarea>
    </div>
    <button class="place-btn" id="placeBtn" onclick="placeOrder()">Place Order</button>`;
}

async function placeOrder() {
  const name = document.getElementById('fName')?.value.trim();
  const phone = document.getElementById('fPhone')?.value.trim();
  const address = document.getElementById('fAddress')?.value.trim() || '';
  const notes = document.getElementById('fNotes')?.value.trim() || '';

  if (!name) { alert('Please enter your name.'); return; }
  if (!phone || phone.length < 10) { alert('Please enter a valid phone number.'); return; }
  if (orderType === 'Delivery' && !address) { alert('Please enter your delivery address.'); return; }

  const btn = document.getElementById('placeBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Placing order...';

  orderCounter++;
  localStorage.setItem('grillinn_counter', orderCounter);
  const orderNumber = String(orderCounter).padStart(3, '0');

  const items = Object.entries(cart).map(([id, item]) => ({
    product_retailer_id: item.title,
    quantity: item.qty,
    item_price: item.price
  }));

  const payload = {
    source: 'website',
    order_number: orderNumber,
    customer_name: name,
    customer_phone: phone,
    order_type: orderType,
    address: address,
    notes: notes,
    items: items,
    order_time: new Date().toLocaleString('en-IN', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', hour12: false })
  };

  try {
    const res = await fetch(SERVER_URL + '/web-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (res.ok) {
      closeCart();
      document.getElementById('successOrder').textContent = 'Order #' + orderNumber;
      document.getElementById('successScreen').classList.add('show');
      cart = {};
      orderType = null;
      updateCartUI();
      document.querySelectorAll('.item-card').forEach(card => {
        const id = card.id.replace('card-', '');
        const item = Object.values(MENU).flat().find(i => i.id === id);
        if (item) {
          const footer = card.querySelector('.item-footer');
          footer.innerHTML = `
            <div class="item-price">₹${item.price}</div>
            <button class="add-btn" onclick="addToCart('${item.id}', '${item.title.replace(/'/g,"\\'")}', ${item.price})">+</button>`;
        }
      });
    } else {
      throw new Error('Server error');
    }
  } catch (e) {
    alert('Could not place order. Please call us at 9612992023.');
    btn.disabled = false;
    btn.textContent = 'Place Order';
  }
}

function resetOrder() {
  document.getElementById('successScreen').classList.remove('show');
}

buildMenu();
</script>
