<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Grill Inn — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap');
  :root{--flame:#f97316;--charcoal:#1a1a1a;--panel:#242424;--border:#333;--white:#fff;--muted:#9ca3af;--green:#22c55e;--red:#ef4444;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--charcoal);color:var(--white);font-family:'Inter','Segoe UI',Arial,sans-serif;min-height:100vh;}
  .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}
  .login-box{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:2rem;width:100%;max-width:360px;}
  .login-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px;font-weight:400;background:linear-gradient(135deg,var(--flame),#dc2626);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:1.5rem;}
  .login-input{width:100%;background:var(--charcoal);border:1px solid var(--border);border-radius:8px;color:var(--white);font-size:0.95rem;padding:0.75rem 0.9rem;outline:none;margin-bottom:0.8rem;}
  .login-input:focus{border-color:var(--flame);}
  .login-btn{width:100%;background:linear-gradient(135deg,var(--flame),#dc2626);border:none;border-radius:8px;color:white;font-weight:700;padding:0.8rem;cursor:pointer;font-size:0.95rem;margin-top:0.4rem;}
  .login-error{color:var(--red);font-size:0.8rem;text-align:center;margin-top:0.6rem;min-height:1.1em;}
  .app{display:none;}
  .app.visible{display:block;}
  header{background:var(--panel);border-bottom:2px solid var(--flame);padding:0.9rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:0.6rem;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:1.5px;background:linear-gradient(135deg,var(--flame),#dc2626);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .tabs{display:flex;gap:0.5rem;flex-wrap:wrap;}
  .tab-btn{background:var(--charcoal);border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-weight:700;padding:0.5rem 1rem;font-size:0.82rem;}
  .tab-btn.active{background:var(--flame);border-color:var(--flame);color:white;}
  .logout-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;padding:0.5rem 0.9rem;font-size:0.78rem;font-weight:700;}
  .main{max-width:900px;margin:0 auto;padding:1rem;}
  .filters-row{display:flex;gap:0.6rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
  .filters-row input[type="date"]{background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--white);padding:0.5rem 0.7rem;font-size:0.85rem;}
  .btn-quick{background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-weight:700;padding:0.5rem 0.9rem;cursor:pointer;font-size:0.8rem;}
  .btn-quick.active{background:var(--flame);border-color:var(--flame);color:white;}
  .search-row{display:flex;gap:0.5rem;margin-bottom:1rem;}
  .search-input{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--white);font-size:0.9rem;padding:0.65rem 0.8rem;outline:none;}
  .search-input:focus{border-color:var(--flame);}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0.7rem;margin-bottom:1.2rem;}
  .stat-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:0.9rem;}
  .stat-label{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:700;}
  .stat-value{font-size:1.3rem;font-weight:800;color:var(--white);margin-top:0.3rem;}
  .section-title{font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin:1.2rem 0 0.6rem;}
  .breakdown-row{display:flex;justify-content:space-between;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:0.65rem 0.9rem;margin-bottom:0.5rem;font-size:0.85rem;}
  .breakdown-row .label{color:var(--white);font-weight:600;}
  .breakdown-row .value{color:var(--flame);font-weight:700;}
  .order-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:0.9rem;margin-bottom:0.7rem;}
  .order-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.4rem;}
  .order-num{font-weight:800;color:var(--flame);}
  .order-type-tag{font-size:0.68rem;font-weight:700;padding:0.2rem 0.55rem;border-radius:10px;background:var(--charcoal);color:var(--muted);}
  .order-meta{font-size:0.78rem;color:var(--muted);line-height:1.5;margin-bottom:0.5rem;}
  .order-items{font-size:0.8rem;color:var(--white);border-top:1px solid var(--border);padding-top:0.5rem;margin-top:0.3rem;}
  .order-item-row{display:flex;justify-content:space-between;padding:0.15rem 0;}
  .order-total{font-weight:700;color:var(--flame);border-top:1px solid var(--border);margin-top:0.4rem;padding-top:0.4rem;text-align:right;}
  .status-tag{font-size:0.68rem;font-weight:700;padding:0.2rem 0.55rem;border-radius:10px;margin-top:0.4rem;display:inline-block;}
  .status-tag.printed{background:rgba(74,222,128,0.15);color:var(--green);}
  .status-tag.pending{background:rgba(249,115,22,0.15);color:var(--flame);}
  .status-tag.rejected,.status-tag.voided,.status-tag.cancelled,.status-tag.print_failed{background:rgba(220,38,38,0.15);color:var(--red);}
  .empty-state{text-align:center;color:var(--muted);padding:3rem 1rem;font-size:0.9rem;}
  .loading{text-align:center;color:var(--muted);padding:2rem;font-size:0.85rem;}
  .top-items-row{display:flex;justify-content:space-between;font-size:0.82rem;padding:0.4rem 0;border-bottom:1px solid var(--border);}

  /* ── Polish pass ─────────────────────────────────────────────────── */
  /* Skeleton placeholders shaped like the content they're waiting for —
     less jarring than a bare "Loading..." line on a slow connection. */
  .skeleton-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:0.9rem;margin-bottom:0.7rem;position:relative;overflow:hidden;min-height:72px;}
  .skeleton-line{height:12px;border-radius:6px;background:#2e2e2e;margin-bottom:0.6rem;}
  .skeleton-line.w40{width:40%;} .skeleton-line.w70{width:70%;} .skeleton-line.w55{width:55%;margin-bottom:0;}
  .skeleton-card::after{content:'';position:absolute;inset:0;background:linear-gradient(100deg,transparent 30%,rgba(255,255,255,0.05) 50%,transparent 70%);background-size:200% 100%;animation:skShimmer 1.3s ease-in-out infinite;}
  @keyframes skShimmer{0%{background-position:150% 0;}100%{background-position:-50% 0;}}

  /* Content rises in when a tab's data lands; cards stagger slightly. */
  .rise-in{animation:riseIn 0.35s ease both;}
  .order-card{animation:riseIn 0.35s ease both;}
  .order-card:nth-child(2){animation-delay:0.04s;} .order-card:nth-child(3){animation-delay:0.08s;}
  .order-card:nth-child(4){animation-delay:0.12s;} .order-card:nth-child(5){animation-delay:0.16s;}
  .order-card:nth-child(n+6){animation-delay:0.2s;}
  @keyframes riseIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  /* Buttons acknowledge the tap. */
  .tab-btn,.btn-quick,.login-btn,.logout-btn{transition:transform 0.12s ease,background 0.2s,border-color 0.2s,color 0.2s;}
  .tab-btn:active,.btn-quick:active,.login-btn:active,.logout-btn:active{transform:scale(0.96);}
  .order-card,.breakdown-row,.stat-card{transition:border-color 0.2s;}
  .order-card:hover,.stat-card:hover{border-color:#4a4a4a;}

  /* Wrong password: the box shakes instead of only printing a line. */
  .login-box.shake{animation:loginShake 0.4s ease;}
  @keyframes loginShake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}

  button:focus-visible,input:focus-visible{outline:2px solid var(--flame);outline-offset:2px;}
  @media (max-width:768px){.login-input,.search-input,.filters-row input[type="date"]{font-size:16px;}}
  @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important;}}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-title">🔒 Grill Inn Admin</div>
    <input type="password" class="login-input" id="loginPassword" placeholder="Dashboard Password" autocomplete="current-password">
    <button class="login-btn" onclick="attemptLogin()">Log In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="app" id="app">
  <header>
    <div class="logo">Grill Inn Admin</div>
    <div class="tabs">
      <button class="tab-btn active" id="salesTab" onclick="switchTab('sales')">📊 Sales</button>
      <button class="tab-btn" id="historyTab" onclick="switchTab('history')">📋 History</button>
    </div>
    <button class="logout-btn" onclick="logout()">Log Out</button>
  </header>
  <div class="main" id="mainContent"></div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
// This page uses the SAME password as your dashboard (orders.py's
// DASHBOARD_PASSWORD) — checked for real on the server for every
// request, not just here in the browser. Nothing secret is stored in
// this file; you type the password in each time you log in.
const SERVER_URL = "https://orders.grillinnfalkawn.in";
// ─────────────────────────────────────────────────────────

let currentTab = 'sales';
let historyDate = toDateStr(new Date());
let historySearchQuery = '';
let historySearchAllDates = false;
let dashPassword = '';

// Escapes text before it's inserted into HTML. Names, addresses, item
// notes and reasons are typed by customers/staff — without this, an order
// placed with markup in a field could inject script into this admin page
// (and this page holds the dashboard password in the session).
function escapeHtml(str) {
  return String(str == null ? '' : str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// All authenticated requests send the password as a header, not a
// ?password= query parameter — query strings end up in Cloudflare/proxy
// access logs and browser history; headers don't.
function authFetch(url) {
  return fetch(url, { headers: { 'X-Dash-Password': dashPassword } });
}

const REDUCED_MOTION = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// Placeholder cards shaped like the incoming content, shown while a fetch
// is in flight.
function skeletonCards(n) {
  let html = '';
  for (let i = 0; i < n; i++) {
    html += '<div class="skeleton-card"><div class="skeleton-line w40"></div><div class="skeleton-line w70"></div><div class="skeleton-line w55"></div></div>';
  }
  return html;
}

// Counts a stat up from 0 to its final value over ~0.5s. Values render
// instantly for anyone with reduced motion enabled.
function countUpStats() {
  document.querySelectorAll('[data-countup]').forEach(el => {
    const target = parseInt(el.getAttribute('data-countup'), 10);
    const prefix = el.getAttribute('data-prefix') || '';
    if (REDUCED_MOTION || isNaN(target) || target <= 0) { el.textContent = prefix + (isNaN(target) ? '0' : target); return; }
    const start = performance.now(), dur = 500;
    function tick(now) {
      const p = Math.min(1, (now - start) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      el.textContent = prefix + Math.round(target * eased);
      if (p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
}

function toDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function attemptLogin() {
  const p = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = 'Checking...';
  fetch(SERVER_URL + '/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: p })
  }).then(r => r.json()).then(res => {
    if (res.status === 'ok') {
      dashPassword = p;
      sessionStorage.setItem('gi_admin_auth_pw', p);
      showApp();
    } else {
      errEl.textContent = 'Incorrect password.';
      const box = document.querySelector('.login-box');
      if (box) { box.classList.remove('shake'); void box.offsetWidth; box.classList.add('shake'); }
    }
  }).catch(e => {
    errEl.textContent = 'Could not reach the server. Check your connection.';
  });
}

document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });

function logout() {
  sessionStorage.removeItem('gi_admin_auth_pw');
  dashPassword = '';
  document.getElementById('app').classList.remove('visible');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginPassword').value = '';
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  switchTab('sales');
}

// If any request comes back 401, the password is wrong/changed since —
// send back to the login screen rather than showing empty data.
function handleUnauthorized() {
  alert('Session expired or password changed — please log in again.');
  logout();
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('salesTab').classList.toggle('active', tab === 'sales');
  document.getElementById('historyTab').classList.toggle('active', tab === 'history');
  if (tab === 'sales') loadSales('today');
  else loadHistory();
}

// ── SALES SUMMARY ─────────────────────────────────────────
let salesStart = toDateStr(new Date());
let salesEnd = toDateStr(new Date());
let activeQuick = 'today';

function loadSales(quick) {
  const main = document.getElementById('mainContent');
  const today = new Date();

  if (quick === 'today') { salesStart = salesEnd = toDateStr(today); activeQuick = 'today'; }
  else if (quick === 'yesterday') { const y = new Date(today); y.setDate(y.getDate()-1); salesStart = salesEnd = toDateStr(y); activeQuick = 'yesterday'; }
  else if (quick === 'week') { const w = new Date(today); w.setDate(w.getDate()-6); salesStart = toDateStr(w); salesEnd = toDateStr(today); activeQuick = 'week'; }
  else if (quick === 'month') { const m = new Date(today); m.setDate(m.getDate()-29); salesStart = toDateStr(m); salesEnd = toDateStr(today); activeQuick = 'month'; }
  else { activeQuick = 'custom'; }

  main.innerHTML = renderSalesFilters() + skeletonCards(3);

  authFetch(SERVER_URL + '/api/sales-summary?start=' + salesStart + '&end=' + salesEnd)
    .then(r => { if (r.status === 401) { handleUnauthorized(); throw new Error('unauthorized'); } return r.json(); })
    .then(data => renderSales(data))
    .catch(e => {
      if (e.message === 'unauthorized') return;
      main.innerHTML = renderSalesFilters() + '<div class="empty-state">Could not load sales data. Check your connection.</div>';
    });
}

function renderSalesFilters() {
  return '<div class="filters-row">' +
    ['today','yesterday','week','month'].map(q =>
      '<button class="btn-quick ' + (activeQuick === q ? 'active' : '') + '" onclick="loadSales(\'' + q + '\')">' +
        ({today:'Today',yesterday:'Yesterday',week:'Last 7 Days',month:'Last 30 Days'})[q] + '</button>'
    ).join('') +
    '<input type="date" value="' + salesStart + '" onchange="salesStart=this.value;loadSales(\'custom\')">' +
    '<span style="color:var(--muted);">to</span>' +
    '<input type="date" value="' + salesEnd + '" onchange="salesEnd=this.value;loadSales(\'custom\')">' +
  '</div>';
}

function renderSales(data) {
  const main = document.getElementById('mainContent');
  const statsHtml =
    '<div class="stat-grid">' +
      '<div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-value" data-countup="' + (data.total_orders||0) + '">0</div></div>' +
      '<div class="stat-card"><div class="stat-label">Total Revenue</div><div class="stat-value" data-countup="' + (data.total_revenue||0) + '" data-prefix="₹">₹0</div></div>' +
    '</div>';

  const byTypeHtml = data.by_type.length ? '<div class="section-title">By Order Type</div>' +
    data.by_type.map(t => '<div class="breakdown-row"><span class="label">' + escapeHtml(t.type) + ' (' + t.count + ' orders)</span><span class="value">₹' + t.revenue + '</span></div>').join('') : '';

  const bySourceHtml = data.by_source.length ? '<div class="section-title">By Source</div>' +
    data.by_source.map(s => '<div class="breakdown-row"><span class="label">' + (s.source === 'pos' ? '🧾 POS' : '🌐 Website') + ' (' + s.count + ' orders)</span><span class="value">₹' + s.revenue + '</span></div>').join('') : '';

  const topItemsHtml = data.top_items.length ? '<div class="section-title">Top Items</div>' +
    '<div class="order-card">' + data.top_items.map(it =>
      '<div class="top-items-row"><span>' + it.qty + 'x ' + escapeHtml(it.name) + '</span><span style="color:var(--flame);font-weight:700;">₹' + it.revenue + '</span></div>'
    ).join('') + '</div>' : '';

  main.innerHTML = renderSalesFilters() + '<div class="rise-in">' + statsHtml +
    (data.total_orders === 0 ? '<div class="empty-state">No confirmed orders in this date range.</div>' : byTypeHtml + bySourceHtml + topItemsHtml) + '</div>';
  countUpStats();
}

// ── ORDER HISTORY ─────────────────────────────────────────
function loadHistory() {
  const main = document.getElementById('mainContent');
  main.innerHTML = renderHistoryFilters() + skeletonCards(4);

  const url = historySearchQuery
    ? SERVER_URL + '/api/search-orders?q=' + encodeURIComponent(historySearchQuery) + (historySearchAllDates ? '' : '&date=' + historyDate)
    : SERVER_URL + '/api/recent-orders?date=' + historyDate;

  authFetch(url)
    .then(r => { if (r.status === 401) { handleUnauthorized(); throw new Error('unauthorized'); } return r.json(); })
    .then(orders => renderHistory(orders))
    .catch(e => {
      if (e.message === 'unauthorized') return;
      main.innerHTML = renderHistoryFilters() + '<div class="empty-state">Could not load orders. Check your connection.</div>';
    });
}

function renderHistoryFilters() {
  const isToday = historyDate === toDateStr(new Date());
  return '<div class="filters-row">' +
      '<button class="btn-quick ' + (isToday && !historySearchAllDates ? 'active' : '') + '" onclick="setHistoryDate(null)">Today</button>' +
      '<input type="date" value="' + historyDate + '" onchange="setHistoryDate(this.value)">' +
    '</div>' +
    '<div class="search-row">' +
      '<input type="text" class="search-input" placeholder="🔍 Search by order # or phone number..." value="' + historySearchQuery.replace(/"/g,'&quot;') + '" oninput="onHistorySearch(this.value)">' +
    '</div>' +
    (historySearchQuery ? '<label style="display:flex;align-items:center;gap:0.5rem;font-size:0.8rem;color:var(--muted);margin-bottom:0.8rem;"><input type="checkbox" ' + (historySearchAllDates?'checked':'') + ' onchange="historySearchAllDates=this.checked;loadHistory()"> Search all dates</label>' : '');
}

function setHistoryDate(d) {
  historyDate = d || toDateStr(new Date());
  loadHistory();
}

let historySearchDebounce = null;
function onHistorySearch(value) {
  clearTimeout(historySearchDebounce);
  historySearchDebounce = setTimeout(() => { historySearchQuery = value.trim(); loadHistory(); }, 400);
}

function renderHistory(orders) {
  const main = document.getElementById('mainContent');

  // Capture focus + caret BEFORE we blow away the DOM, so a debounce-driven
  // re-render (which replaces the whole search box) doesn't kick the cursor
  // out of the field after the first character. Previously this restoration
  // was an empty stub, so every keystroke past the debounce lost focus and
  // the admin had to re-tap the box for each character.
  const prev = document.querySelector('.search-input');
  const wasFocused = !!prev && document.activeElement === prev;
  const caretStart = wasFocused ? prev.selectionStart : null;
  const caretEnd = wasFocused ? prev.selectionEnd : null;

  if (orders.length === 0) {
    main.innerHTML = renderHistoryFilters() + '<div class="empty-state">No orders found.</div>';
  } else {
    main.innerHTML = renderHistoryFilters() + orders.map(renderOrderCard).join('');
  }

  if (wasFocused) {
    const input = document.querySelector('.search-input');
    if (input) {
      input.focus();
      // Restore the caret where it was (default to end if unavailable).
      const len = input.value.length;
      try { input.setSelectionRange(caretStart == null ? len : caretStart, caretEnd == null ? len : caretEnd); }
      catch (e) {}
    }
  }
}

const KNOWN_STATUSES = { printed:'✅ Printed', pending:'⏳ Pending', rejected:'✕ Rejected', voided:'🚫 Voided', cancelled:'🚫 Cancelled', print_failed:'⚠️ Print Failed' };

function renderOrderCard(order) {
  let items = [];
  try { items = JSON.parse(order.items_json || '[]'); } catch(e) {}
  const itemsHtml = items.map(i =>
    '<div class="order-item-row"><span>' + (parseInt(i.quantity, 10) || 0) + 'x ' + escapeHtml(i.product_retailer_id) + '</span><span>₹' + ((i.quantity||0) * (i.item_price||0)) + '</span></div>'
  ).join('');
  const discountAmount = order.discount_amount || 0;
  const grandTotal = order.subtotal + (order.packing_charge||0) - discountAmount + (order.order_type === 'Delivery' ? (order.delivery_charge||0) : 0);
  const statusLabel = KNOWN_STATUSES[order.status] || escapeHtml(order.status);
  // Whitelisted class name — never inject a raw status string into an attribute.
  const statusClass = Object.prototype.hasOwnProperty.call(KNOWN_STATUSES, order.status) ? order.status : '';
  const sourceTag = order.source === 'pos' ? ' 🧾 POS' : '';

  return '<div class="order-card">' +
    '<div class="order-header"><span class="order-num">#' + escapeHtml(order.order_number) + sourceTag + '</span><span class="order-type-tag">' + escapeHtml(order.order_type) + '</span></div>' +
    '<div class="order-meta">' + escapeHtml(order.customer_name) + ' • ' + escapeHtml(order.customer_phone) + (order.address ? '<br>📍 ' + escapeHtml(order.address) : '') + '<br>🕒 ' + escapeHtml(order.order_time) + '</div>' +
    '<div class="order-items">' + itemsHtml +
      (discountAmount > 0 ? '<div class="order-item-row" style="color:var(--flame);"><span>Discount (' + (order.discount_percent||0) + '%)</span><span>−₹' + discountAmount + '</span></div>' : '') +
      '<div class="order-total">Total: ₹' + grandTotal + '</div></div>' +
    '<span class="status-tag ' + statusClass + '">' + statusLabel + '</span>' +
    (order.out_for_delivery_at ? '<span class="status-tag printed" style="margin-left:0.4rem;">🛵 Out ' + escapeHtml((order.out_for_delivery_at || '').split(', ')[1] || order.out_for_delivery_at) + (order.driver_name ? ' • ' + escapeHtml(order.driver_name) : '') + '</span>' : '') +
    (order.status === 'voided' && order.void_reason ? '<div style="font-size:0.75rem;color:var(--muted);margin-top:0.4rem;">Reason: ' + escapeHtml(order.void_reason) + '</div>' : '') +
    (order.status === 'rejected' && order.reject_reason ? '<div style="font-size:0.75rem;color:var(--muted);margin-top:0.4rem;">Reason: ' + escapeHtml(order.reject_reason) + '</div>' : '') +
  '</div>';
}

// ── INIT ───────────────────────────────────────────────────
const savedPw = sessionStorage.getItem('gi_admin_auth_pw');
if (savedPw) {
  dashPassword = savedPw;
  showApp();
} else {
  document.getElementById('loginScreen').style.display = 'flex';
}
</script>
</body>
</html>
